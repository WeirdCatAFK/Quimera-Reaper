<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quimera Reaper Agent</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #080808;
            --pink: #f472b6;
            --red: #ef4444;
            --text: #ffffff;
            --grey: #52525b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--pink);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--red);
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .status-tag {
            font-size: 0.7rem;
            color: var(--pink);
            font-weight: 800;
            letter-spacing: 2px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
            flex: 1;
            min-height: 0;
        }

        .console-container {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--pink);
            background: var(--card);
            overflow: hidden;
        }

        .console-header {
            background: #111;
            padding: 10px 20px;
            border-bottom: 1px solid var(--pink);
            font-size: 0.65rem;
            color: var(--red);
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .console {
            flex: 1;
            padding: 20px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            overflow-y: auto;
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .sidebar {
            border: 1px solid var(--pink);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        h2 {
            font-size: 0.75rem;
            margin: 0;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .harvest-list {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.8rem;
            color: var(--grey);
        }

        .controls-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--pink);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .gimmick-slot {
            background: repeating-linear-gradient(45deg, #000, #000 10px, #050505 10px, #050505 20px);
            border: 1px dashed var(--pink);
            opacity: 0.6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pink);
            font-size: 0.65rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .checkbox-item input { accent-color: var(--red); width: 16px; height: 16px; }

        input[type="number"], input[type="text"] {
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 8px 12px;
            font-size: 0.8rem;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--pink); }

        .btn {
            padding: 12px 24px;
            border: 1px solid var(--pink);
            background: transparent;
            color: var(--pink);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn:hover { background: var(--pink); color: #000; }
        .btn-harvest { color: var(--red); border-color: var(--red); }
        .btn-harvest:hover { background: var(--red); color: white; }

        .actions-row { display: flex; gap: 15px; }

        .stats-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .stat-card {
            border: 1px solid var(--pink);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label { color: var(--grey); font-size: 0.65rem; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .stat-value { font-weight: 900; color: var(--red); font-size: 1.2rem; }

        .log-entry { margin-bottom: 6px; border-left: 2px solid #222; padding-left: 15px; }
        .log-sync { border-color: var(--red); color: var(--red); }
        .log-success { border-color: var(--pink); color: var(--pink); }
        .log-error { border-color: #ff0000; color: #ff0000; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Quimera Reaper</h1>
        <div class="status-tag">SYSTEM_REAPER_PRO_v2.5</div>
    </div>
    <div id="reap-status" style="color: var(--red); font-weight: 900; font-size: 0.8rem;">[ AGENT_STANDBY ]</div>
</header>

<div class="main-grid">
    <div class="console-container">
        <div class="console-header">
            <span>Kernel Logs</span>
            <span style="color: var(--pink)">// Secure Connection</span>
        </div>
        <div class="console" id="console">
            <div>// Initialization sequence complete.</div>
            <div>// Ready for harvest instructions.</div>
        </div>
    </div>
    <div class="sidebar">
        <h2>Mirror Logs</h2>
        <div class="harvest-list" id="harvest-list"></div>
    </div>
</div>

<div class="controls-row">
    <div class="card">
        <h2>Harvest Targets</h2>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" id="sync-likes" checked> Likes</label>
            <label class="checkbox-item"><input type="checkbox" id="sync-albums" checked> Albums</label>
            <label class="checkbox-item"><input type="checkbox" id="sync-playlists"> Playlists</label>
            <label class="checkbox-item"><input type="checkbox" id="include-videos"> Videos</label>
        </div>
    </div>
    <div class="card">
        <h2>Recording Params</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label style="font-size: 0.6rem; color: var(--grey);">Bitrate</label>
                <input type="number" id="set-bitrate" value="192">
            </div>
            <div>
                <label style="font-size: 0.6rem; color: var(--grey);">Limit</label>
                <input type="number" id="set-max-songs" value="20">
            </div>
        </div>
        <button class="btn" style="padding: 6px; font-size: 0.6rem;" onclick="saveSettings()">Apply Settings</button>
    </div>
    <div class="card gimmick-slot">
        [ SLOT_RESERVED_FOR_FUTURE_GIMMICK ]
    </div>
</div>

<div class="actions-row">
    <button class="btn btn-harvest" style="flex: 1.5" onclick="startHarvest()">Mirror Library</button>
    <button class="btn" id="reap-btn" style="flex: 1" onclick="startRecording()">Record Queue</button>
    <button class="btn" onclick="exportZip()">Export ZIP</button>
    <button class="btn" onclick="loginAssistant()">Login</button>
    <button class="btn" style="border-color: var(--red); color: var(--red);" onclick="resetHistory()">Reset</button>
</div>

<footer class="stats-footer">
    <div class="stat-card">
        <span class="stat-label">Harvested Songs</span>
        <span class="stat-value" id="stat-songs">0</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Pending Records</span>
        <span class="stat-value" id="stat-queue" style="color: var(--pink)">0</span>
    </div>
</footer>

<script>
    const socket = io();
    const consoleEl = document.getElementById('console');
    const harvestList = document.getElementById('harvest-list');

    async function saveSettings() {
        const settings = {
            audioBitrate: parseInt(document.getElementById('set-bitrate').value),
            maxSongsPerSession: parseInt(document.getElementById('set-max-songs').value),
            minDelaySeconds: 30,
            maxDelaySeconds: 120
        };
        await fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(settings)
        });
    }

    async function loadSettings() {
        const res = await fetch('/api/settings');
        const s = await res.json();
        document.getElementById('set-bitrate').value = s.audioBitrate;
        document.getElementById('set-max-songs').value = s.maxSongsPerSession;
    }

    function startHarvest() {
        const targets = {
            likes: document.getElementById('sync-likes').checked,
            albums: document.getElementById('sync-albums').checked,
            playlists: document.getElementById('sync-playlists').checked,
            videos: document.getElementById('include-videos').checked
        };
        fetch('/api/harvest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targets })
        });
    }

    async function startRecording() { fetch('/api/reap', { method: 'POST' }); }
    function exportZip() { window.location.href = '/api/export'; }
    async function loginAssistant() { await fetch('/api/login-assistant', { method: 'POST' }); }
    async function resetHistory() {
        if (confirm("Execute system wipe? All harvest records will be purged.")) {
            await fetch('/api/reset', { method: 'POST' });
        }
    }

    socket.on('log', (data) => {
        const div = document.createElement('div');
        div.className = `log-entry log-${data.type}`;
        div.innerText = `[${new Date(data.timestamp).toLocaleTimeString()}] ${data.message}`;
        consoleEl.appendChild(div);
        consoleEl.scrollTop = consoleEl.scrollHeight;

        if (data.type === 'sync' || data.type === 'success') {
            const historyItem = document.createElement('div');
            historyItem.style.marginBottom = '6px';
            historyItem.innerText = `> ${data.message}`;
            harvestList.prepend(historyItem);
        }
    });

    socket.on('status', (data) => {
        if (data.totalSongs !== undefined) document.getElementById('stat-songs').innerText = data.totalSongs;
        if (data.queueLength !== undefined) document.getElementById('stat-queue').innerText = data.queueLength;
        const reapBtn = document.getElementById('reap-btn');
        const statusTag = document.getElementById('reap-status');
        if (data.isReaping) {
            reapBtn.innerText = "RECORDING...";
            reapBtn.disabled = true;
            reapBtn.style.opacity = "0.5";
            statusTag.innerText = "[ AGENT_ACTIVE ]";
            statusTag.style.color = "var(--pink)";
        } else {
            reapBtn.innerText = "RECORD QUEUE";
            reapBtn.disabled = false;
            reapBtn.style.opacity = "1";
            statusTag.innerText = "[ AGENT_STANDBY ]";
            statusTag.style.color = "var(--red)";
        }
    });

    loadSettings();
    fetch('/api/status').then(r => r.json()).then(data => {
        document.getElementById('stat-songs').innerText = data.totalSongs || 0;
        document.getElementById('stat-queue').innerText = data.queueLength || 0;
    });
</script>

</body>
</html>
